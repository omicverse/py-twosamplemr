name: Publish to PyPI

# Builds the sdist + wheel and publishes to PyPI via OIDC Trusted
# Publishing (no API token — the project's trusted publisher is
# configured on pypi.org for this repo + this workflow file).
# Manually triggered for each release.
on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write          # required for PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
